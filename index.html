<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameer ❤️ Taheniya Wedding</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg,#ffe6f0,#fff0f5);
  overflow-x: hidden;
}

/* FIRST PAGE */
#secretScreen {
  height: 100vh;
  position: relative;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at bottom, #001f3f, #000814);
}

/* MAIN */
#mainSite { display:none; }

header {
  padding:80px 20px;
  color:white;
  background: radial-gradient(circle at bottom, #001f3f, #000814);
}

/* CARD */
.card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.7);
  margin:20px auto;
  padding:20px;
  max-width:400px;
  border-radius:20px;
}

/* EVENTS */
.event-box {
  padding:15px;
  margin:10px;
  border-radius:15px;
}
.haldi { background:#fff176; }
.wedding { background:#ff4e8a; color:white; }
.reception { background:#5f2c82; color:white; }

/* BUTTON */
button {
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#ff4e8a;
  color:white;
  cursor:pointer;
  margin:5px;
}

/* POPUP */
.popup {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
}

.popup.active {
  visibility:visible;
  opacity:1;
}

.popup-card {
  background:white;
  padding:25px;
  border-radius:20px;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  left: 15px;
  bottom: 15px;
  padding: 12px;
  border-radius: 50%;
  background: #ff4e8a;
  color: white;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- FIRST PAGE -->
<div id="secretScreen">
  <h2>💌 You're Invited</h2>
  <h3>From Khan Family</h3>
  <button onclick="enterSite()">Enter</button>
</div>

<!-- MAIN -->
<div id="mainSite">

<header>
  <h1>Sameer ❤️ Taheniya</h1>
  <h2 id="countdown"></h2>
</header>

<div class="card">
  <h2>💌 Will you join us?</h2>

  <!-- NAME INPUT -->
  <input type="text" id="guestName" placeholder="Enter your name 💖" style="padding:10px;border-radius:10px;border:none;margin-bottom:10px;">
  <br>

  <button onclick="showYes()">Yes 💖</button>
  <button onclick="showNo()">No 😢</button>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card" id="popupContent"></div>
</div>

<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<script>
function enterSite(){
  document.getElementById("secretScreen").style.display="none";
  document.getElementById("mainSite").style.display="block";
}

/* COUNTDOWN */
const d=new Date("April 5, 2026").getTime();
setInterval(()=>{
 let n=new Date().getTime();
 let days=Math.floor((d-n)/(1000*60*60*24));
 document.getElementById("countdown").innerHTML=days+" days left 💍";
},1000);

/* 🔥 GOOGLE SHEET FUNCTION */
function sendData(response){
  let name = document.getElementById("guestName").value;

  if(name==""){
    alert("Please enter your name 💖");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbybpaLR6O_4313dRJV9JUHV0qqgysZWJ-Zthzi3dmWRxpn-Qz_pHuNoMsJ5lp3m9KiTtA/exec", {
    method: "POST",
    body: new URLSearchParams({
      name: name,
      response: response
    })
  });
}

/* POPUP */
function showYes(){
  sendData("YES");

  document.getElementById("popupContent").innerHTML = `
    <h2>💖 Thank You!</h2>
    <p>We’re so excited to celebrate this beautiful moment with you! See you there 🎉</p>
    <button onclick="closePopup()">Close ✨</button>
  `;
  document.getElementById("popup").classList.add("active");
}

function showNo(){
  sendData("NO");

  document.getElementById("popupContent").innerHTML = `
    <h2>😢 We’ll Miss You</h2>
    <p>You’ll be missed on our special day, but your love means everything to us 💖</p>
    <button onclick="closePopup()">Close ❤️</button>
  `;
  document.getElementById("popup").classList.add("active");
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

/* MUSIC */
function toggleMusic(){
 let music=document.getElementById("bgMusic");
 let btn=document.getElementById("musicBtn");
 if(music.paused){
   music.play();
   btn.innerHTML="🔊";
 } else {
   music.pause();
   btn.innerHTML="🔇";
 }
}
</script>

</body>
</html>
